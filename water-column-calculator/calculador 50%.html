<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Columna de Agua</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <h1>Cálculo de Columna de Agua</h1>
            <p>Introduce los datos para verificar el nivel tras la purga.</p>
        </header>

        <form id="calculator-form" class="glass-panel">
            <div class="input-group">
                <label for="depth">Profundidad total (A) en metros</label>
                <input type="number" id="depth" step="0.01" required placeholder="Ej: 100">
            </div>

            <div class="input-group">
                <label for="initialLevel">Nivel de agua inicial (B) en metros</label>
                <input type="number" id="initialLevel" step="0.01" required placeholder="Ej: 20">
            </div>

            <div class="results-panel intermediate-results" id="intermediate-results" style="display: none;">
                <div class="result-item">
                    <span class="result-label">Columna de Agua (A - B):</span>
                    <span class="result-value" id="waterColumnValue">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">50% de la Columna (C):</span>
                    <span class="result-value highlight" id="halfColumnValue">-</span>
                </div>
            </div>

            <div class="input-group final-level-group">
                <label for="finalLevel">Nivel de agua final tras purgar en metros</label>
                <input type="number" id="finalLevel" step="0.01" required placeholder="Ej: 50">
            </div>

            <button type="submit" class="calculate-btn">Verificar</button>
        </form>

        <div id="final-result" class="glass-panel result-card" style="display: none;">
            <div class="status-icon" id="status-icon"></div>
            <h2 id="result-title">Resultado</h2>
            <p id="result-message">Mensaje del resultado.</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
